name: nxms-mesh

services:
  node-01:
    build: { context: ., dockerfile: Dockerfile.node }
    environment:
      NODE_ID: node-01
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: "9000"
      VAULT_DIR: /data/vault
      PEERS_JSON: /data/peers.json
    volumes:
      - ./deploy/mesh/identities/node-01:/data/vault
      - ./deploy/mesh/peers.json:/data/peers.json:ro
    networks: [nxms-net]

